name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build release
        run: cargo build --release --locked

      - name: Smoke test Windows vault
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $fakeBin = Join-Path $env:RUNNER_TEMP "fake-bin"
          New-Item -ItemType Directory -Force -Path $fakeBin | Out-Null
          Set-Content -Path (Join-Path $fakeBin "npx.cmd") -Value "@echo off`r`nexit /b 0"
          $env:PATH = "$fakeBin;$env:PATH"
          $vault = Join-Path $env:RUNNER_TEMP "agents-wiki-vault"
          .\target\release\agents-wiki.exe init $vault --force
          .\target\release\agents-wiki.exe --vault $vault doctor --json
          .\target\release\agents-wiki.exe --vault $vault paths --json
